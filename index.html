<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebMeiChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #3B82F6;
            --primary-dark: #1D4ED8;
            --primary-light: #60A5FA;
            --primary-glow: rgba(59, 130, 246, 0.3);
            --primary-bg: rgba(59, 130, 246, 0.1);
            --dark-bg: #0F172A;
            --dark-card: #1E293B;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
        }
        
        html, body, #app {
            height: 100%;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        #screen-container {
            position: relative;
            flex-grow: 1;
            overflow: hidden;
        }
        
        .screen-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.3s ease-in-out;
            background-color: var(--dark-bg);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .screen-enter-start {
            transform: translateX(100%);
        }
        .screen-enter-end {
            transform: translateX(0);
        }
        .screen-leave-end {
            transform: translateX(-100%);
        }
        
        .primary-button {
            background: linear-gradient(135deg, #3B82F6, #0EA5E9);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            border: none;
            cursor: pointer;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .primary-button:hover {
            background: linear-gradient(135deg, #2563EB, #38BDF8);
            transform: translateY(-2px);
        }
        
        .primary-button:active {
            transform: translateY(0);
        }
        
        .primary-button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .secondary-button {
            background-color: var(--dark-card);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid #334155;
            cursor: pointer;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .secondary-button:hover {
            background-color: #334155;
            border-color: #3B82F6;
        }
        
        .active-tab {
            color: #3B82F6 !important;
            background-color: rgba(59, 130, 246, 0.15) !important;
            border-radius: 0.75rem;
            position: relative;
        }
        
        .active-tab::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 25%;
            width: 50%;
            height: 3px;
            background: linear-gradient(90deg, #3B82F6, #0EA5E9);
            border-radius: 3px;
        }
        
        .loading-circle {
            display: inline-block;
            width: 1em;
            height: 1em;
            border-radius: 50%;
            border: 2px solid #fff;
            border-color: #fff transparent #fff transparent;
            animation: spin 1.2s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .messages-container {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 1rem;
            flex-grow: 1;
            -webkit-overflow-scrolling: touch;
        }
        
        .message-bubble {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 1.2rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            word-break: break-word;
            white-space: pre-wrap;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        
        .message-incoming {
            background-color: var(--dark-card);
            align-self: flex-start;
            border-top-left-radius: 0.2rem;
        }
        
        .message-outgoing {
            background: linear-gradient(135deg, #3B82F6, #0EA5E9);
            color: white;
            align-self: flex-end;
            border-top-right-radius: 0.2rem;
        }
        
        .message-system {
            background-color: #475569;
            color: #CBD5E1;
            font-size: 0.8rem;
            border-radius: 0.75rem;
            padding: 0.5rem 1rem;
            max-width: 100%;
            margin: 0.5rem auto;
            text-align: center;
        }
        
        .date-separator {
            text-align: center;
            margin: 1rem 0;
            position: relative;
        }
        
        .date-separator-line {
            display: inline-block;
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--text-secondary);
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 50;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            padding: 1rem;
        }
        
        .modal-content {
            background-color: var(--dark-card);
            padding: 1.5rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 350px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
        }
        
        .modal.hidden {
            display: none;
        }
        
        .message-with-avatar {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .message-with-avatar .avatar {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 0.75rem;
            flex-shrink: 0;
            cursor: pointer;
            border: 2px solid var(--dark-card);
        }
        
        .input-field {
            background-color: var(--dark-card);
            border: 1px solid #334155;
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            width: 100%;
            transition: all 0.2s;
            font-size: 16px;
            min-height: 44px;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        .card {
            background-color: var(--dark-card);
            border-radius: 1rem;
            padding: 1.25rem;
            border: 1px solid #334155;
        }
        
        .avatar-preview {
            width: 6rem;
            height: 6rem;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--dark-card);
        }
        
        .tab-bar {
            background-color: var(--dark-bg);
            border-top: 1px solid #334155;
            padding: 0.5rem;
            position: sticky;
            bottom: 0;
            z-index: 40;
            backdrop-filter: blur(10px);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #3B82F6, #0EA5E9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            background-color: var(--dark-card);
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
            min-height: 60px;
        }
        
        .chat-item:hover {
            background-color: #334155;
            border-color: #3B82F6;
        }
        
        .gift-item {
            background: linear-gradient(135deg, var(--dark-card), #1E293B);
            border-radius: 1rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid #334155;
            transition: all 0.2s;
        }
        
        .gift-item:hover {
            transform: translateY(-2px);
            border-color: #3B82F6;
        }
        
        .inventory-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            background-color: var(--dark-card);
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            border: 1px solid #334155;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #334155;
            background: linear-gradient(135deg, #3B82F6, #0EA5E9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stars-badge {
            background: linear-gradient(135deg, #3B82F6, #0EA5E9);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }
        
        .notification-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: linear-gradient(135deg, #3B82F6, #1D4ED8);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.8);
        }
        
        .channel-item, .group-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: linear-gradient(135deg, var(--dark-card), #1E293B);
            border-radius: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid #334155;
            transition: all 0.2s;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .channel-item:hover, .group-item:hover {
            border-color: #3B82F6;
        }
        
        .admin-badge {
            background: linear-gradient(135deg, #3B82F6, #0EA5E9);
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 0.5rem;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background-color: var(--dark-card);
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            border: 1px solid #334155;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
            flex-shrink: 0;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #475569;
            transition: .4s;
            border-radius: 24px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: #3B82F6;
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }
        
        .member-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            background-color: var(--dark-card);
            border-radius: 0.75rem;
            margin-bottom: 0.5rem;
            border: 1px solid #334155;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .bot-chat {
            background: linear-gradient(135deg, #1E40AF, #3B82F6);
            border-left: 4px solid #3B82F6;
        }
        
        .theme-light {
            --dark-bg: #F8FAFC;
            --dark-card: #FFFFFF;
            --text-primary: #1E293B;
            --text-secondary: #475569;
        }
        
        .theme-oled {
            --dark-bg: #000000;
            --dark-card: #0A0A0A;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
        }
        
        .theme-blue {
            --dark-bg: #0F1A2F;
            --dark-card: #1A2B4A;
            --text-primary: #E2E8F0;
            --text-secondary: #94A3B8;
        }
        
        .theme-dark {
            --dark-bg: #0F172A;
            --dark-card: #1E293B;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
        }
        
        .blocked-user-item {
            background: linear-gradient(135deg, #7F1D1D, #3B82F6);
            border-left: 4px solid #3B82F6;
        }
        
        #scroll-to-bottom-btn {
            background: linear-gradient(135deg, #3B82F6, #0EA5E9);
            color: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            border: 2px solid var(--dark-card);
            font-size: 18px;
            position: fixed;
            bottom: 120px;
            right: 16px;
        }
        
        #scroll-to-bottom-btn.visible {
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .section-title {
                font-size: 1.25rem;
                padding: 0.5rem 1rem;
            }
            .message-bubble {
                max-width: 90%;
                padding: 0.5rem 0.75rem;
            }
            #scroll-to-bottom-btn {
                bottom: 100px;
                right: 12px;
                width: 40px;
                height: 40px;
            }
        }
        
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        .ios-fixed-fix {
            transform: translateZ(0);
        }
    </style>
</head>
<body class="no-select">
    <div id="app" class="flex flex-col h-full ios-fixed-fix">
        <div id="screen-container" class="flex-grow better-scroll"></div>

        <div id="tab-bar" class="tab-bar transition-all duration-300 flex-shrink-0 ios-fixed-fix">
            <div class="flex justify-around text-xs">
                <button data-tab="chats_list" class="tab-button flex flex-col items-center p-2 rounded-lg transition-colors hover:bg-slate-800 active-tab relative">
                    <span class="text-xl mb-1">💬</span>
                    <span>Чаты</span>
                </button>
                <button data-tab="add_chat" class="tab-button flex flex-col items-center p-2 rounded-lg transition-colors hover:bg-slate-800 relative">
                    <span class="text-xl mb-1">➕</span>
                    <span>Новый</span>
                </button>
                <button data-tab="notifications" class="tab-button flex flex-col items-center p-2 rounded-lg transition-colors hover:bg-slate-800 relative">
                    <span class="text-xl mb-1">🔔</span>
                    <span>Уведом.</span>
                    <span id="notification-badge" class="notification-badge hidden">0</span>
                </button>
                <button data-tab="news" class="tab-button flex flex-col items-center p-2 rounded-lg transition-colors hover:bg-slate-800">
                    <span class="text-xl mb-1">📰</span>
                    <span>Новости</span>
                </button>
                <button data-tab="channels_groups" class="tab-button flex flex-col items-center p-2 rounded-lg transition-colors hover:bg-slate-800">
                    <span class="text-xl mb-1">📢</span>
                    <span>Сообщ.</span>
                </button>
                <button data-tab="shop" class="tab-button flex flex-col items-center p-2 rounded-lg transition-colors hover:bg-slate-800">
                    <span class="text-xl mb-1">⭐</span>
                    <span>Магазин</span>
                </button>
                <button data-tab="profile" class="tab-button flex flex-col items-center p-2 rounded-lg transition-colors hover:bg-slate-800">
                    <span class="text-xl mb-1">👤</span>
                    <span>Профиль</span>
                </button>
            </div>
        </div>
    </div>
    
    <div id="custom-modal" class="modal hidden">
        <div class="modal-content text-center">
            <h3 id="modal-title" class="text-xl font-bold mb-3 gradient-text"></h3>
            <p id="modal-message" class="mb-5 text-slate-300"></p>
            <button id="modal-ok-button" class="primary-button w-full">ОК</button>
            <div id="modal-confirm-buttons" class="flex justify-between hidden mt-3">
                <button id="modal-cancel-button" class="secondary-button w-[48%]">Отмена</button>
                <button id="modal-confirm-button" class="primary-button w-[48%] bg-red-600 hover:bg-red-700">Подтвердить</button>
            </div>
        </div>
    </div>
    
    <div id="user-profile-modal" class="modal hidden">
        <div class="modal-content text-center">
            <button class="absolute top-2 right-4 text-3xl font-light text-slate-500 hover:text-slate-300 transition-colors" onclick="document.getElementById('user-profile-modal').classList.add('hidden')">&times;</button>
            <img id="modal-profile-avatar" src="" alt="Аватар" class="avatar-preview mx-auto mb-3">
            <h3 id="modal-profile-name" class="text-2xl font-bold text-white"></h3>
            <p id="modal-profile-username" class="text-slate-400 mb-4"></p>
            <p id="modal-profile-bio" class="text-l font-bold text-white"></p>
            <h4 class="text-xl font-semibold mt-6 mb-3 border-b border-slate-700 pb-1">Подарки</h4>
            <div id="modal-profile-gifts" class="grid grid-cols-4 gap-4 p-3 bg-slate-800 rounded-xl min-h-[50px]"></div>
        </div>
    </div>

    <div id="channel-settings-modal" class="modal hidden">
        <div class="modal-content text-left max-w-md max-h-[80vh] overflow-y-auto">
            <button class="absolute top-2 right-4 text-3xl font-light text-slate-500 hover:text-slate-300 transition-colors" onclick="document.getElementById('channel-settings-modal').classList.add('hidden')">&times;</button>
            <h3 id="channel-settings-title" class="text-xl font-bold mb-4 gradient-text">Настройки канала</h3>
            <div id="channel-settings-content"></div>
        </div>
    </div>

    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        const WORKER_URL = 'https://webmeichat-api.твой-аккаунт.workers.dev';
        
        let loginStage = 'loading'; 
        let currentChatId = null;
        let currentUser = {};
        let chatsData = [];
        let notifications = [];
        let channels = [];
        let groups = [];
        let news = [];
        let messagesPollInterval = null;
        let notificationsPollInterval = null;
        const chatPollRate = 2000;
        const notificationsPollRate = 5000;

        const GIFTS_STORE = {
            'bear': { emoji: '🐻', price: 10, name: 'Мишка' },
            'heart': { emoji: '❤️', price: 15, name: 'Сердце' },
            'champagne': { emoji: '🍾', price: 20, name: 'Шампанское' },
            'casino': { emoji: '🎰', price: 8000, name: 'Казино' },
            'cat': { emoji: '😻', price: 50, name: 'Котик' },
            'lemon': { emoji: '🍋', price: 200, name: 'Лимон' },
            'duck': { emoji: '🦆', price: 20, name: 'Утка' },
            'burger': { emoji: '🍔', price: 500, name: 'Бургер' },
            'santa': { emoji: '🎅', price: 100, name: 'Санта' },
            'halloween': { emoji: '🎃', price: 300, name: 'Буу...' },
            'agermester': { emoji: '🥃', price: 500, name: 'Ягерместер' },
            'tablet': { emoji: '💻', price: 40, name: 'Ноутбук' },
            'graphic': { emoji: '📈', price: 30, name: 'График' },
            'panda': { emoji: '🐼', price: 60, name: 'Панда' },
            'turtle': { emoji: '🐢', price: 25, name: 'Черепаха' },
            'ninja': { emoji: '🥷', price: 35, name: 'Ниндзя' },
            'tree': { emoji: '🎄', price: 100, name: 'Ёлка' },
            'diamond': { emoji: '💎', price: 100, name: 'Бриллиант' },
            'first': { emoji: '🏆', price: 100, name: 'Кубок' },
            'ghost': { emoji: '👻', price: 5, name: 'Призрак' },
        };

        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('Mei_theme') || 'dark';
            applyTheme(savedTheme);
            checkAuthAndRoute();
        });

        // ========== ФУНКЦИЯ ДЛЯ РАБОТЫ С CLOUDFLARE ==========
        async function apiRequest(action, data = {}, isForm = false) {
            console.log('📡 Отправляем на Cloudflare:', action, data);
            
            try {
                const formData = new FormData();
                formData.append('action', action);
                
                if (isForm && data instanceof FormData) {
                    if (!data.has('action')) {
                        data.append('action', action);
                    }
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        body: data
                    });
                    return await response.json();
                } else {
                    for (let key in data) {
                        formData.append(key, data[key]);
                    }
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        body: formData
                    });
                    return await response.json();
                }
            } catch (error) {
                console.error('❌ Ошибка:', error);
                showModal('Ошибка', 'Не удалось связаться с сервером');
                return { success: false, error: error.message };
            }
        }

        function showModal(title, message, isConfirm = false, onConfirm = null) {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').innerHTML = message;

            document.getElementById('modal-ok-button').classList.toggle('hidden', isConfirm);
            document.getElementById('modal-confirm-buttons').classList.toggle('hidden', !isConfirm);

            if (!isConfirm && onConfirm) {
                document.getElementById('modal-ok-button').onclick = () => {
                    modal.classList.add('hidden');
                    onConfirm();
                };
            } else if (!isConfirm && !onConfirm) {
                document.getElementById('modal-ok-button').onclick = () => {
                    modal.classList.add('hidden');
                };
            }
            
            if (isConfirm) {
                document.getElementById('modal-confirm-button').onclick = () => {
                    modal.classList.add('hidden');
                    if (onConfirm) onConfirm();
                };
                document.getElementById('modal-cancel-button').onclick = () => {
                    modal.classList.add('hidden');
                };
            }

            modal.classList.remove('hidden');
        }

        function applyTheme(theme) {
            const root = document.documentElement;
            root.classList.remove('theme-dark', 'theme-light', 'theme-oled', 'theme-blue');
            root.classList.add(`theme-${theme}`);
        }

        async function blockUser(targetUserId, targetUserName) {
            const reason = prompt(`Введите причину блокировки пользователя ${targetUserName}:`, 'Нарушение правил');
            if (reason === null) return;
            if (!reason.trim()) {
                showModal('Ошибка', 'Необходимо указать причину блокировки.');
                return;
            }
            const result = await apiRequest('block_user', {
                target_user_id: targetUserId,
                reason: reason.trim()
            });
            if (result.success) {
                showModal('Успех', `Пользователь ${targetUserName} заблокирован.`);
            } else {
                showModal('Ошибка', result.error || 'Не удалось заблокировать пользователя.');

        }

        function createInviteLink(type, username) {
            const baseUrl = window.location.origin + window.location.pathname;
            return `${baseUrl}?join=${type}:${username}`;
        }

        function copyJoinLink(username, type) {
            const joinUrl = createInviteLink(type, username);
            navigator.clipboard.writeText(joinUrl).then(() => {
                showModal('Ссылка скопирована!', `Ссылка для присоединения скопирована в буфер обмена: ${joinUrl}`, false);
            }).catch(() => {
                showModal('Ошибка', 'Не удалось скопировать ссылку.');
            });
        }

        function handleJoinLinks() {
            const urlParams = new URLSearchParams(window.location.search);
            const joinParam = urlParams.get('join');
            if (joinParam) {
                const [type, username] = joinParam.split(':');
                if (type && username) {
                    showModal('Присоединение к сообществу', `Вы хотите присоединиться к сообществу @${username}?`, true, () => {
                        joinCommunityByUsername(username);
                        const newUrl = window.location.pathname;
                        window.history.replaceState({}, document.title, newUrl);
                    });
                }
            }
        }

            const username = document.getElementById('username').value.toLowerCase().trim();

            if (username.length < 3 || password.length < 6) {
                document.getElementById('auth-message').textContent = 'Логин (3+) и пароль (6+) обязательны.';
                return;
            }
            button.disabled = true;
            button.innerHTML = '<span class="loading-circle"></span> Проверка...';
            const result = await apiRequest('check_username', { username });
            if (result.success) {
                if (result.exists) {
                    document.getElementById('auth-message').textContent = `Пользователь @${username} найден. Нажмите, чтобы войти.`;
                    button.innerHTML = 'Войти';
                    loginStage = 'login';
                } else {
                    document.getElementById('auth-message').textContent = `Пользователь @${username} не найден. Нажмите, чтобы зарегистрироваться.`;
                    button.innerHTML = 'Зарегистрироваться';
                    loginStage = 'register';
                }
            } else {
                showModal('Ошибка', result.error || 'Произошла ошибка при проверке логина.');
                button.innerHTML = 'Проверить логин';
            }
            button.disabled = false;
        }

                return;

        async function fetchChats() {
            const result = await apiRequest('get_chats');

                    renderChatsList();

        function renderChatsList() {
            const sortedChats = [...chatsData].sort((a, b) => {
                if (a.type === 'general') return -1;
                if (b.type === 'general') return 1;
                const aIsBot = a.name.includes('Mei') || a.name.includes('MEI');
                const bIsBot = b.name.includes('Mei') || b.name.includes('MEI');
                if (aIsBot && !bIsBot) return -1;
                if (!aIsBot && bIsBot) return 1;
                if (a.type === 'bot' && b.type !== 'bot') return 1;
                if (b.type === 'bot' && a.type !== 'bot') return -1;
                return (b.last_timestamp || 0) - (a.last_timestamp || 0);
            });
            
            const chatsHtml = sortedChats.map(chat => {
                const lastMessage = chat.last_message ? chat.last_message.substring(0, 50) + (chat.last_message.length > 50 ? '...' : '') : 'Нет сообщений';
                const isBot = chat.type === 'bot';
                const time = chat.last_timestamp ? new Date(chat.last_timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                const otherId = chat.other_id || null;
                let icon = '💬';
                if (chat.type === 'general') icon = '🌐';
                if (chat.type === 'channel') icon = '📢';
                if (chat.type === 'group') icon = '👥';
                if (isBot) icon = '🤖';
                return `
                    <div class="chat-item ${isBot ? 'bot-chat' : ''}" 
                         onclick="switchScreen('chat_view', { chatId: '${chat.id}', chatName: '${chat.name.replace(/'/g, "\\'")}', chatType: '${chat.type}', interlocutorId: '${otherId}', isBotChat: ${isBot} })">
                        <div class="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center mr-3 flex-shrink-0 text-xl">${icon}</div>
                        <div class="flex-grow min-w-0">
                            <div class="flex justify-between items-center">
                                <h3 class="font-bold truncate text-white">${chat.name} ${chat.member_count ? `(${chat.member_count})` : ''} ${chat.is_admin ? '<span class="admin-badge ml-1">Админ</span>' : ''}</h3>
                                <span class="text-xs text-slate-400">${time}</span>
                            </div>
                            <p class="text-sm text-slate-400 truncate">${lastMessage}</p>
                        </div>
                    </div>
                `;
            }).join('');
        
            const html = `
                <div id="chats_list_view" class="p-4 flex flex-col h-full">
                    <h2 class="section-title">Чаты</h2>
                    <div id="chats-list-container" class="flex-grow overflow-y-auto">
                        ${chatsHtml || '<p class="text-slate-400 text-center py-8">Нет чатов</p>'}
                    </div>
                </div>
            `;
            document.getElementById('screen-container').innerHTML = `<div id="chats_list_screen_content" class="screen-content">${html}</div>`;
        }

            const chatViewHTML = `

                    ${isBot ? `<div class="p-4 bg-slate-800 text-center text-slate-400 text-sm">🤖 Это чат с ботом Mei. Вы не можете отправлять сообщения.</div>` : ''}
                </div>
            `;
            document.getElementById('screen-container').innerHTML = `<div id="chat_view_screen_content" class="screen-content">${chatViewHTML}</div>`;
            fetchMessages(chatId, true);
            messagesPollInterval = setInterval(() => fetchMessages(chatId), chatPollRate);

        async function fetchMessages(chatId, shouldScroll = false) {
            const result = await apiRequest('get_messages', { chat_id: chatId });
            const messagesContainer = document.getElementById('message-list');
            if (result.success) {
                const messages = result.messages;
                if (messagesContainer) {
                    renderMessages(messages);
                }
                if (shouldScroll && messagesContainer) {
                    setTimeout(() => messagesContainer.scrollTop = messagesContainer.scrollHeight, 100);
                }
            }
        }

        function renderMessages(messages) {
            const list = document.getElementById('message-list');
            if (!list) return;
            
            const oldScrollTop = list.scrollTop;
            const oldScrollHeight = list.scrollHeight;
            const wasAtBottom = oldScrollHeight - list.clientHeight - oldScrollTop < 100;
            
            let lastDate = null;
            const today = new Date();
            const todayStr = `${today.getDate().toString().padStart(2, '0')}.${(today.getMonth()+1).toString().padStart(2, '0')}.${today.getFullYear()}`;
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = `${yesterday.getDate().toString().padStart(2, '0')}.${(yesterday.getMonth()+1).toString().padStart(2, '0')}.${yesterday.getFullYear()}`;
            
            const messagesHtml = messages.map(msg => {
                const msgDate = new Date(msg.timestamp * 1000);
                const day = msgDate.getDate().toString().padStart(2, '0');
                const month = (msgDate.getMonth()+1).toString().padStart(2, '0');
                const year = msgDate.getFullYear();
                const msgDateStr = `${day}.${month}.${year}`;
                
                let dateSep = '';
                if (lastDate !== msgDateStr) {
                    lastDate = msgDateStr;
                    let displayDate = msgDateStr === todayStr ? 'Сегодня' : (msgDateStr === yesterdayStr ? 'Вчера' : `${day}.${month}.${year}`);
                    dateSep = `<div class="date-separator"><span class="date-separator-line">${displayDate}</span></div>`;
                }
                
                const isSystem = msg.type === 'system' || msg.type === 'system_gift';
                const isOutgoing = msg.sender_id === currentUser.id;
                const isBot = msg.sender_id === 'security_bot';
                
                if (isSystem) {
                    return `${dateSep}<div class="message-bubble message-system text-center italic mt-2">${msg.content}</div>`;
                }
                
                const content = msg.type === 'photo' ? `<img src="${msg.file_path}" alt="Фото" class="max-w-full rounded-lg" onclick="window.open(this.src)">` : msg.content;
                const senderName = isOutgoing ? 'Вы' : (msg.sender_name || 'Бот');
                const bubbleClass = isOutgoing ? 'message-outgoing' : 'message-incoming';
                
                if (isBot && (!msg.sender_avatar || msg.sender_avatar === 'bot.png')) {
                    msg.sender_avatar = 'default.png';
                }
                
                const showAvatar = (currentChatData.chatType === 'general' || currentChatData.chatType === 'channel' || currentChatData.chatType === 'group' || isBot) && !isOutgoing;
                
                if (showAvatar) {
                    return `${dateSep}
                        <div class="message-with-avatar">
                            <img src="${msg.sender_avatar || 'default.png'}" alt="Аватар" class="avatar" ${!isBot ? `onclick="showUserProfileModal('${msg.sender_id}')"` : ''}>
                            <div class="flex flex-col">
                                <p class="text-xs font-semibold mb-1 text-slate-400">${senderName}</p>
                                <div class="message-bubble ${bubbleClass}">${content}</div>
                                <span class="text-xs text-slate-500 mt-1">${new Date(msg.timestamp * 1000).toLocaleTimeString()}</span>
                            </div>
                        </div>`;
                } else {
                    return `${dateSep}
                        <div class="${isOutgoing ? 'flex justify-end' : 'flex justify-start'}">
                            <div class="flex flex-col">
                                <div class="message-bubble ${bubbleClass}">${content}</div>
                                <span class="text-xs text-slate-500 mt-1 ${isOutgoing ? 'text-right' : 'text-left'}">${new Date(msg.timestamp * 1000).toLocaleTimeString()}</span>
                            </div>
                        </div>`;
                }
            }).join('');
            
            list.innerHTML = messagesHtml;
            if (wasAtBottom) {
                list.scrollTop = list.scrollHeight;
            } else {
                list.scrollTop = oldScrollTop + (list.scrollHeight - oldScrollHeight);
            }
            initScrollHandler();
        }

        function initScrollHandler() {
            const list = document.getElementById('message-list');
            const btn = document.getElementById('scroll-to-bottom-btn');
            if (list && btn) {
                list.addEventListener('scroll', () => {
                    const scrollBottom = list.scrollHeight - list.clientHeight - list.scrollTop;
                    if (scrollBottom < 100) {
                        btn.style.opacity = '0';
                        setTimeout(() => btn.style.display = 'none', 300);
                    } else {
                        btn.style.display = 'flex';
                        setTimeout(() => btn.style.opacity = '1', 10);
                    }
                });
            }
        }

        function scrollToBottom() {
            const list = document.getElementById('message-list');
            const btn = document.getElementById('scroll-to-bottom-btn');
            if (list) {
                list.scrollTop = list.scrollHeight;
                if (btn) {
                    btn.style.opacity = '0';
                    setTimeout(() => btn.style.display = 'none', 300);
                }
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const fileInput = document.getElementById('photo-upload');
            const content = input.value.trim();
            const photoFile = fileInput.files[0];
            if (!content && !photoFile) {
                showModal('Ошибка', 'Сообщение не может быть пустым.');
                return;
            }
            const formData = new FormData();
            formData.append('action', 'send_message');
            formData.append('chat_id', currentChatId);
            formData.append('content', content);
            if (photoFile) {
                formData.append('photo', photoFile);
            }
            const result = await apiRequest('send_message', formData, true);
            if (result.success) {
                input.value = '';
                fileInput.value = '';
                document.getElementById('photo-label').textContent = '🖼️';
                fetchMessages(currentChatId);
                fetchChats();
            } else {
                if (result.error && result.error.includes('заблокирован')) {
                    showModal('Аккаунт заблокирован', result.error, false, logout);
                } else {
                    showModal('Ошибка', result.error || 'Не удалось отправить сообщение.');
                }
            }
        }

        async function searchAndAddAdmin(channelId) {
            const username = document.getElementById('new-admin-search').value.trim();
            if (!username) {
                showModal('Ошибка', 'Введите логин.');
                return;

            const search = await apiRequest('search_users', { query: username });
            if (search.success && search.users.length > 0) {
                const user = search.users[0];
                showModal('Добавить администратора?', `Назначить <strong>${user.name}</strong> (@${user.username}) администратором?`, true, async () => {
                    const result = await apiRequest('add_channel_admin', { channel_id: channelId, target_user_id: user.id });

        function renderGiftsInventory(gifts) {
            if (!gifts || Object.keys(gifts).length === 0) return '<p class="text-slate-400 text-sm">Инвентарь пуст.</p>';
            const groups = {};
            for (let id in gifts) {
                const g = gifts[id];
                const emoji = typeof g === 'string' ? g : g.emoji;
                const key = Object.keys(GIFTS_STORE).find(k => GIFTS_STORE[k].emoji === emoji);
                if (key) {
                    if (!groups[key]) groups[key] = { emoji, name: GIFTS_STORE[key].name, price: Math.floor(GIFTS_STORE[key].price * 0.5), count: 0, ids: [] };
                    groups[key].count++;
                    groups[key].ids.push(id);
                }
            }
            return Object.keys(groups).map(key => `
                <div class="inventory-item">
                    <div class="flex items-center">
                        <span class="text-2xl mr-3">${groups[key].emoji}</span>
                        <div><h4 class="font-bold">${groups[key].name}</h4><p class="text-sm text-slate-400">В инвентаре: <strong>x${groups[key].count}</strong></p></div>
                    </div>
                    <button class="primary-button bg-yellow-600 hover:bg-yellow-700 text-sm px-3 py-1" onclick="attemptSellGift('${groups[key].ids[0]}', ${groups[key].price}, '${groups[key].emoji}', '${groups[key].name}')">Продать (${groups[key].price} ⭐)</button>
                </div>
            `).join('');
        }

        async function attemptSellGift(id, price, emoji, name) {
            showModal('Продать?', `Продать один ${emoji} ${name} за ${price} ⭐?`, true, async () => {
                const result = await apiRequest('sell_gift', { gift_id: id });
                if (result.success) {
                    currentUser.stars = result.new_stars;
                    delete currentUser.gifts[id];
                    showModal('Продано!', `Вы продали ${emoji} ${name}. Баланс: ${result.new_stars} ⭐.`, false, renderProfileView);
                } else {
                    showModal('Ошибка', result.error || 'Не удалось продать.');
                }
            });
        }

        function confirmClearChat() {
            showModal('Очистить общий чат?', 'Это действие необратимо.', true, clearGeneralChat);
        }

        async function clearGeneralChat() {
            const result = await apiRequest('clear_general_chat');
            if (result.success) {
                showModal('Успех', `Общий чат очищен. Удалено сообщений: ${result.count}.`, false, () => {
                    if (currentChatData.chatId === 'general') fetchMessages(currentChatData.chatId, true);
                });
            } else {
                showModal('Ошибка', result.error || 'Не удалось очистить.');
            }
        }

        let currentScreen = 'loading';
        let currentChatData = {};

        function renderAndAnimateNewScreen(screenName, data) {
            if (screenName === 'welcome') renderWelcomeScreen();
            else if (screenName === 'setup') renderSetupScreen();
            else if (screenName === 'chats_list') renderChatsList();
            else if (screenName === 'chat_view') renderChatView(data);
            else if (screenName === 'profile') renderProfileView();
            else if (screenName === 'edit_profile') renderEditProfileView();
            else if (screenName === 'shop') renderShopView();
            else if (screenName === 'add_chat') renderAddChatView();
            else if (screenName === 'gift_search') renderSearchUsersView('gift_search', data);
            else if (screenName === 'notifications') renderNotificationsView();
            else if (screenName === 'news') renderNewsView();
            else if (screenName === 'channels_groups') renderChannelsGroupsView();
            else if (screenName === 'settings') renderSettingsView();
            
            const el = document.getElementById('screen-container').firstElementChild;
            if (el) {
                el.classList.add('screen-enter-start');
                void el.offsetWidth;
                el.classList.remove('screen-enter-start');
                el.classList.add('screen-enter-end');
            }
            if (screenName === 'chats_list') fetchChats();
            else if (screenName === 'notifications') fetchNotifications();
            else if (screenName === 'news') fetchNews();
            else if (screenName === 'channels_groups') { fetchChannels(); fetchGroups(); }
        }

        function switchScreen(screenName, data = {}) {
            if (messagesPollInterval) { clearInterval(messagesPollInterval); messagesPollInterval = null; }
            const tabBar = document.getElementById('tab-bar');
            if (['welcome','setup'].includes(screenName)) tabBar.style.display = 'none';
            else {
                tabBar.style.display = 'flex';
                document.querySelectorAll('.tab-button').forEach(btn => {
                    btn.classList.remove('active-tab');
                    if (btn.getAttribute('data-tab') === screenName || 
                        (screenName === 'edit_profile' && btn.getAttribute('data-tab') === 'profile') ||
                        (screenName === 'gift_search' && btn.getAttribute('data-tab') === 'shop') ||
                        (screenName === 'settings' && btn.getAttribute('data-tab') === 'profile')) {
                        btn.classList.add('active-tab');
                    }
                });
            }
            const prevEl = document.getElementById('screen-container').firstElementChild;
            const prev = currentScreen;
            currentScreen = screenName;
            currentChatId = data.chatId || null;
            currentChatData = data;
            if (prevEl && !['welcome','setup'].includes(prev)) {
                prevEl.classList.add('screen-leave-end');
                setTimeout(() => {
                    document.getElementById('screen-container').innerHTML = '';
                    renderAndAnimateNewScreen(screenName, data);
                }, 300);
            } else {
                document.getElementById('screen-container').innerHTML = '';
                renderAndAnimateNewScreen(screenName, data);
            }
        }

        async function checkAuthAndRoute() {
            const auth = await apiRequest('get_current_user');
            if (auth.logged_in) {
                currentUser = auth.user;
                if (auth.setup_needed) switchScreen('setup');
                else {
                    switchScreen('chats_list');
                    notificationsPollInterval = setInterval(fetchNotifications, notificationsPollRate);
                    handleJoinLinks();
                }
            } else switchScreen('welcome');
        }

        document.getElementById('tab-bar').addEventListener('click', (e) => {
            const btn = e.target.closest('.tab-button');
            if (btn) switchScreen(btn.getAttribute('data-tab'));
        });

        checkAuthAndRoute();
    </script>
</body>
</html>
